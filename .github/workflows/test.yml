name: Test

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['24.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Show Node version
        run: node --version

      - name: Build project
        run: npm run build

      - name: Verify CLI exists
        run: ls -la dist/cli/index.js

      - name: Generate playground
        run: npm run pg -- --force

      - name: Debug Angular generation
        run: ls -la playground/angular/src/__generated__/Dialog/ || echo "Dialog dir not found"

      - name: Manual Angular Dialog test
        run: |
          mkdir -p test-manual
          cd test-manual
          echo '{"version":"1.0.0","framework":"angular","styleSystem":"css","theme":"minimal"}' > crucible.config.json
          node ../dist/cli/index.js add Dialog -y 2>&1
          echo "---Files in src/components---"
          ls -la src/components/ || echo "no components dir"
          ls -la src/components/dialog/ || echo "no dialog dir"

      - name: Run E2E tests with debug
        run: |
          npm run test:e2e 2>&1 || true
          ls -la .e2e-test-env/src/components/dialog/ || echo "dialog dir not found"

      - name: Run unit tests
        run: npm test
